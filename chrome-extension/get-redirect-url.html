<!DOCTYPE html>
<html>
<head><title>Get Redirect URL</title>
<style>
  body { font-family: monospace; padding: 20px; background: #0a0a12; color: #e2e8f0; }
  #url { background: #1a1a2e; padding: 12px; border-radius: 6px; word-break: break-all; margin-top: 10px; }
</style>
</head>
<body>
  <p>Add this URL to Supabase → Authentication → URL Configuration → Redirect URLs:</p>
  <div id="url">Loading…</div>
  <script>
    document.getElementById('url').textContent = chrome.identity.getRedirectURL()
  </script>
</body>
</html>
