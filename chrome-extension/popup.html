<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dopamaxxing</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <!-- Login screen -->
        <div id="login-screen" class="screen">
            <div class="login-header">
                <div class="logo-text">DOPAMAXXING</div>
                <div class="logo-sub">study tracker</div>
            </div>
            <div class="login-form">
                <button id="google-btn" class="btn-oauth btn-google">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
                <button id="discord-btn" class="btn-oauth btn-discord">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                    Continue with Discord
                </button>
                <div id="login-error" class="error-msg hidden"></div>
                <div class="redirect-hint hidden" id="redirect-hint">
                    <div class="redirect-label">Add this to Supabase → Auth → Redirect URLs:</div>
                    <div class="redirect-url" id="redirect-url-text" title="Click to copy"></div>
                    <div class="redirect-copied hidden" id="redirect-copied">Copied!</div>
                </div>
            </div>
        </div>

        <!-- Main dashboard -->
        <div id="main-screen" class="screen hidden">
            <!-- Migration warning -->
            <div id="migration-banner" class="migration-banner hidden">
                Run DB migration to enable study keys — see extension README
            </div>

            <!-- Header -->
            <div class="header">
                <div class="user-row">
                    <div class="avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <div class="username" id="username-label">—</div>
                        <div class="user-title" id="title-label"></div>
                    </div>
                    <div class="level-badge" id="level-badge">Lv.1</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat">
                    <span class="stat-val" id="coins-val">—</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">BR: </span>
                    <span class="stat-val" id="br-val">—</span>
                </div>
                <div class="stat xp-stat">
                    <span class="stat-icon">XP: </span>
                    <div class="xp-bar-wrap">
                        <div class="xp-bar-fill" id="xp-bar"></div>
                    </div>
                    <span class="stat-val" id="xp-val">—</span>
                </div>
            </div>

            <!-- Tab nav -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
                <button class="tab-btn" data-tab="crates">Crates</button>
                <button class="tab-btn" data-tab="bag">Bag</button>
            </div>

            <!-- Dashboard tab -->
            <div id="tab-dashboard" class="tab-panel">
                <div class="section">
                    <div class="section-title">
                        <span>Study Session</span>
                        <span class="study-indicator" id="study-indicator"></span>
                    </div>
                    <div class="study-body">
                        <div class="study-site" id="study-site">Not studying</div>
                        <div class="study-progress">
                            <div class="progress-bar-wrap">
                                <div class="progress-bar-fill" id="study-progress-bar"></div>
                            </div>
                            <div class="study-progress-text">
                                <span id="study-min-label">0 min today</span>
                                <span id="study-next-key">keys drop randomly while studying</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Crate keys summary in dashboard -->
                <div class="section">
                    <div class="section-title">Crate Keys</div>
                    <div id="dashboard-crate-keys" class="crates-list">
                        <div class="crate-loading">Loading…</div>
                    </div>
                </div>
            </div>

            <!-- Crates tab -->
            <div id="tab-crates" class="tab-panel hidden">
                <div id="crates-tab-content">
                    <div id="crates-list-panel">
                        <div id="crates-error" class="crate-error hidden"></div>
                        <div id="crates-list" class="crates-list">
                            <div class="crate-loading">Loading…</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bag tab (favorites) -->
            <div id="tab-bag" class="tab-panel hidden">
                <div id="bag-content">
                    <div class="section-title" style="padding: 10px 14px 4px; margin: 0;">
                        <span>Favorites</span>
                        <button id="bag-refresh-btn" class="btn-ghost" style="margin-left: auto; font-size: 9px; padding: 3px 7px;">↺</button>
                    </div>
                    <div id="bag-grid" class="bag-grid">
                        <div class="crate-loading" style="padding: 12px 14px;">Loading…</div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <button id="refresh-btn" class="btn-ghost">↺ Refresh</button>
                <button id="open-app-btn" class="btn-ghost">Open App ↗</button>
                <button id="logout-btn" class="btn-ghost btn-danger">Sign Out</button>
            </div>
        </div>

        <!-- Crate opening overlay (covers full popup) -->
        <div id="crate-overlay" class="crate-overlay hidden">
            <!-- Spinning phase -->
            <div id="overlay-spin" class="overlay-phase">
                <div class="overlay-pack-label" id="overlay-pack-name"></div>
                <div class="reel-wrap">
                    <div class="reel-fade-l"></div>
                    <div class="reel-fade-r"></div>
                    <div class="reel-line"></div>
                    <div class="reel-viewport">
                        <div id="reel-strip"></div>
                    </div>
                </div>
                <div id="reel-winner-label" class="reel-winner-label hidden">
                    <div id="reel-winner-name" class="reel-winner-name"></div>
                    <div id="reel-winner-sub" class="reel-winner-sub"></div>
                </div>
            </div>

            <!-- Result phase -->
            <div id="overlay-result" class="overlay-phase hidden">
                <div class="result-card-wrap">
                    <img id="result-img" class="result-img" alt="" />
                    <div id="result-new-badge" class="result-new-badge hidden">NEW</div>
                </div>
                <div id="result-name" class="result-name"></div>
                <div id="result-rarity" class="result-rarity"></div>
                <div id="result-value" class="result-value"></div>
                <div class="result-actions">
                    <button id="result-bag-btn" class="btn-primary">Add to Bag</button>
                    <button id="result-sell-btn" class="btn-sell">Sell</button>
                </div>
                <button id="result-back-btn" class="btn-ghost" style="margin-top:6px; font-size:10px;">← back to crates</button>
            </div>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
